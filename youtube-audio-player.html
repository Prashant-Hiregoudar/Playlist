<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEUE — YouTube Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --muted: #555;
    --muted2: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .logo span { color: var(--muted); font-weight: 400; font-size: 13px; letter-spacing: 0.05em; margin-left: 12px; font-family: 'Space Mono', monospace; }

  .header-actions { display: flex; gap: 10px; }

  .btn-sm {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MAIN PLAYER AREA */
  main {
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  /* NOW PLAYING */
  .now-playing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .now-playing::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform-origin: left;
    transform: scaleX(0);
    transition: none;
  }
  .now-playing.playing::before {
    animation: progressBar 0.1s linear forwards;
  }

  .np-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .np-title {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 6px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .np-idle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 400;
  }

  /* YouTube iframe — must be visible & sized or browsers block autoplay */
  #yt-player-wrap {
    position: fixed;
    bottom: 60px; right: 16px;
    width: 200px; height: 113px;
    border-radius: 8px;
    overflow: hidden;
    opacity: 0.01;
    pointer-events: none;
    z-index: 0;
  }
  #yt-player { width: 100%; height: 100%; border: none; }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 24px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 20px;
    padding: 8px;
    border-radius: 6px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
  .ctrl-btn.primary {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 18px;
    border: none;
  }
  .ctrl-btn.primary:hover { background: #d4eb00; }
  .ctrl-btn.active { color: var(--accent); }

  .volume-wrap {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto;
  }
  .volume-wrap span { font-size: 16px; color: var(--muted); }

  input[type=range] {
    -webkit-appearance: none;
    width: 90px; height: 3px;
    background: var(--muted2);
    border-radius: 2px;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* ADD TO QUEUE */
  .add-section { display: flex; flex-direction: column; gap: 10px; }

  .add-section label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .input-row { display: flex; gap: 10px; }

  input[type=text] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]::placeholder { color: var(--muted); }
  input[type=text]:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 11px 18px;
    cursor: pointer;
    transition: background 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn-add:hover { background: #d4eb00; }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    display: none;
  }

  /* SIDEBAR — QUEUE */
  aside {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .queue-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: #1f2200;
    border: 1px solid #3a4400;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .queue-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
  }

  .queue-list::-webkit-scrollbar { width: 3px; }
  .queue-list::-webkit-scrollbar-track { background: transparent; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.12s;
    position: relative;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item.active { border-left-color: var(--accent); background: #0f1100; }

  .qi-index {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .queue-item.active .qi-index { color: var(--accent); }

  .qi-thumb {
    width: 46px; height: 34px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--muted2);
    flex-shrink: 0;
    display: block;
  }

  .qi-info { flex: 1; min-width: 0; }

  .qi-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    line-height: 1.3;
  }
  .queue-item.active .qi-title { color: var(--accent); }

  .qi-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .qi-del {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .queue-item:hover .qi-del { opacity: 1; }
  .qi-del:hover { color: var(--accent2); background: #1a0a0a; }

  .empty-queue {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }
  .empty-queue .icon { font-size: 32px; opacity: 0.3; }

  /* SAVED PLAYLISTS */
  .saved-section {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
  }

  .saved-header {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .saved-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }

  .saved-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    background: var(--surface2);
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .saved-item:hover { border-color: var(--border); }

  .saved-item-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .saved-item-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: 8px;
    flex-shrink: 0;
  }
  .saved-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 12px; margin-left: 6px; opacity: 0;
    transition: opacity 0.1s;
  }
  .saved-item:hover .saved-del { opacity: 1; }
  .saved-del:hover { color: var(--accent2); }

  .no-saved {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 10px 0;
  }

  /* FOOTER */
  footer {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted2);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 340px;
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #d4eb00; }

  .btn-cancel {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  .repeat-indicator {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-left: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">QUEUE <span>YouTube Audio Player</span></div>
  <div class="header-actions">
    <button class="btn-sm" onclick="openSaveModal()">SAVE PLAYLIST</button>
    <button class="btn-sm danger" onclick="clearQueue()">CLEAR QUEUE</button>
  </div>
</header>

<main>
  <div class="now-playing" id="nowPlayingCard">
    <div class="np-label">▶ NOW PLAYING</div>
    <div class="np-title np-idle" id="npTitle">Nothing playing — add videos to queue</div>
  </div>

  <!-- YouTube Player (tiny, near-invisible but real size so browser allows autoplay) -->
  <div id="yt-player-wrap"><div id="yt-player"></div></div>

  <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
    <div class="controls">
      <button class="ctrl-btn" id="btnRepeat" onclick="toggleRepeat()" title="Repeat">↩</button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
      <button class="ctrl-btn primary" id="btnPlay" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
      <button class="ctrl-btn" id="btnShuffle" onclick="toggleShuffle()" title="Shuffle">⇄</button>
    </div>
    <div class="volume-wrap">
      <span>🔊</span>
      <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)" id="volSlider">
    </div>
  </div>

  <div class="add-section">
    <label>Add YouTube URL to Queue</label>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=..." onkeydown="if(event.key==='Enter') addToQueue()">
      <button class="btn-add" onclick="addToQueue()">+ ADD</button>
    </div>
    <span class="error-msg" id="errMsg">⚠ Invalid YouTube URL</span>
  </div>
</main>

<aside>
  <div class="sidebar-header">
    <span class="sidebar-title">Queue</span>
    <span class="queue-count" id="queueCount">0 tracks</span>
  </div>
  <div class="queue-list" id="queueList">
    <div class="empty-queue">
      <div class="icon">♬</div>
      <div>Your queue is empty.<br>Paste a YouTube link to start.</div>
    </div>
  </div>
  <div class="saved-section">
    <div class="saved-header">Saved Playlists</div>
    <div class="saved-list" id="savedList">
      <div class="no-saved">No saved playlists yet</div>
    </div>
  </div>
</aside>

<footer>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Idle</span>
</footer>

<!-- Save Playlist Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>Save Playlist</h3>
    <label style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:8px;">Playlist Name</label>
    <input type="text" id="playlistNameInput" placeholder="My Playlist" style="width:100%">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="btn-primary" onclick="savePlaylist()">SAVE</button>
    </div>
  </div>
</div>

<script>
  // ── STATE ──
  let queue = [];
  let currentIndex = -1;
  let player = null;
  let isPlaying = false;
  let repeatMode = false;
  let shuffleMode = false;
  let playerReady = false;
  let pendingVideoId = null; // play this once player is ready

  // ── YOUTUBE IFrame API ──
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
      height: '113', width: '200',
      playerVars: {
        autoplay: 1,
        controls: 0,
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
        origin: window.location.origin || 'https://localhost'
      },
      events: {
        onReady: function(e) {
          playerReady = true;
          e.target.setVolume(parseInt(document.getElementById('volSlider').value));
          // Play anything that was queued before player was ready
          if (pendingVideoId) {
            e.target.loadVideoById(pendingVideoId);
            pendingVideoId = null;
          }
        },
        onStateChange: onPlayerStateChange,
        onError: function(e) {
          const codes = {2:'Invalid video ID',5:'HTML5 error',100:'Video not found',101:'Embedding not allowed',150:'Embedding not allowed'};
          setStatus('Error: ' + (codes[e.data] || 'Playback error'), true);
        }
      }
    });
  };

  function setStatus(msg, isErr) {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('statusDot').style.background = isErr ? 'var(--accent2)' : '';
  }

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
      if (repeatMode) { player.seekTo(0); player.playVideo(); }
      else { nextTrack(); }
    }
    if (e.data === YT.PlayerState.PLAYING) {
      isPlaying = true;
      document.getElementById('btnPlay').textContent = '⏸';
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusDot').style.background = '';
      setStatus('Playing');
    }
    if (e.data === YT.PlayerState.PAUSED) {
      isPlaying = false;
      document.getElementById('btnPlay').textContent = '▶';
      document.getElementById('statusDot').classList.remove('active');
      setStatus('Paused');
    }
    if (e.data === YT.PlayerState.BUFFERING) {
      setStatus('Buffering…');
    }
    if (e.data === YT.PlayerState.CUED) {
      player.playVideo();
    }
  }

  // ── EXTRACT VIDEO ID ──
  function extractVideoId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtube.com')) {
        return u.searchParams.get('v');
      }
      if (u.hostname === 'youtu.be') {
        return u.pathname.slice(1).split('?')[0];
      }
    } catch {}
    const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // ── ADD TO QUEUE ──
  async function addToQueue() {
    const input = document.getElementById('urlInput');
    const err = document.getElementById('errMsg');
    const url = input.value.trim();
    const vid = extractVideoId(url);
    if (!vid) {
      err.style.display = 'block';
      input.style.borderColor = 'var(--accent2)';
      setTimeout(() => { err.style.display='none'; input.style.borderColor=''; }, 2500);
      return;
    }

    const title = await fetchTitle(vid);
    const thumb = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
    queue.push({ vid, title, thumb, url });
    input.value = '';
    err.style.display = 'none';

    renderQueue();
    if (currentIndex === -1) playIndex(0);
  }

  async function fetchTitle(vid) {
    try {
      const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${vid}`);
      const data = await res.json();
      return data.title || `Video: ${vid}`;
    } catch {
      return `Video: ${vid}`;
    }
  }

  // ── PLAY ──
  function playIndex(i) {
    if (i < 0 || i >= queue.length) return;
    currentIndex = i;
    const track = queue[i];

    document.getElementById('npTitle').textContent = track.title;
    document.getElementById('npTitle').classList.remove('np-idle');
    setStatus('Loading…');

    if (playerReady && player) {
      player.loadVideoById(track.vid);
    } else {
      // Player not ready yet — store for when it is
      pendingVideoId = track.vid;
    }
    renderQueue();
  }

  function togglePlay() {
    if (!playerReady || !player) {
      setStatus('Player loading, please wait…'); return;
    }
    if (currentIndex === -1 && queue.length > 0) { playIndex(0); return; }
    if (isPlaying) { player.pauseVideo(); }
    else { player.playVideo(); }
  }

  function nextTrack() {
    if (!queue.length) return;
    let next;
    if (shuffleMode) {
      next = Math.floor(Math.random() * queue.length);
    } else {
      next = currentIndex + 1;
      if (next >= queue.length) next = 0;
    }
    playIndex(next);
  }

  function prevTrack() {
    if (!queue.length) return;
    let prev = currentIndex - 1;
    if (prev < 0) prev = queue.length - 1;
    playIndex(prev);
  }

  function toggleRepeat() {
    repeatMode = !repeatMode;
    document.getElementById('btnRepeat').classList.toggle('active', repeatMode);
  }

  function toggleShuffle() {
    shuffleMode = !shuffleMode;
    document.getElementById('btnShuffle').classList.toggle('active', shuffleMode);
  }

  function setVolume(v) {
    if (playerReady && player) player.setVolume(parseInt(v));
  }

  // ── QUEUE UI ──
  function renderQueue() {
    const list = document.getElementById('queueList');
    const count = document.getElementById('queueCount');
    count.textContent = `${queue.length} track${queue.length !== 1 ? 's' : ''}`;

    if (!queue.length) {
      list.innerHTML = `<div class="empty-queue"><div class="icon">♬</div><div>Your queue is empty.<br>Paste a YouTube link to start.</div></div>`;
      return;
    }

    list.innerHTML = queue.map((t, i) => `
      <div class="queue-item ${i === currentIndex ? 'active' : ''}" onclick="playIndex(${i})">
        <div class="qi-index">${i === currentIndex ? '▶' : i + 1}</div>
        <img class="qi-thumb" src="${t.thumb}" alt="" onerror="this.style.background='#222'">
        <div class="qi-info">
          <div class="qi-title">${t.title}</div>
          <div class="qi-id">${t.vid}</div>
        </div>
        <button class="qi-del" onclick="event.stopPropagation(); removeTrack(${i})" title="Remove">✕</button>
      </div>
    `).join('');
  }

  function removeTrack(i) {
    const wasPlaying = i === currentIndex;
    queue.splice(i, 1);
    if (wasPlaying) {
      currentIndex = -1;
      document.getElementById('npTitle').textContent = 'Nothing playing — add videos to queue';
      document.getElementById('npTitle').classList.add('np-idle');
      if (playerReady && player) player.stopVideo();
      if (queue.length > 0) {
        const next = Math.min(i, queue.length - 1);
        playIndex(next);
      }
    } else if (i < currentIndex) {
      currentIndex--;
    }
    renderQueue();
  }

  function clearQueue() {
    queue = []; currentIndex = -1;
    if (playerReady && player) player.stopVideo();
    isPlaying = false;
    pendingVideoId = null;
    document.getElementById('btnPlay').textContent = '▶';
    document.getElementById('npTitle').textContent = 'Nothing playing — add videos to queue';
    document.getElementById('npTitle').classList.add('np-idle');
    document.getElementById('statusDot').classList.remove('active');
    setStatus('Idle');
    renderQueue();
  }

  // ── SAVE / LOAD PLAYLISTS ──
  function openSaveModal() {
    if (!queue.length) return alert('Queue is empty!');
    document.getElementById('saveModal').classList.add('open');
    document.getElementById('playlistNameInput').focus();
  }
  function closeSaveModal() {
    document.getElementById('saveModal').classList.remove('open');
    document.getElementById('playlistNameInput').value = '';
  }

  function savePlaylist() {
    const name = document.getElementById('playlistNameInput').value.trim() || `Playlist ${Date.now()}`;
    const saved = JSON.parse(localStorage.getItem('yt-playlists') || '{}');
    saved[name] = queue.map(t => ({ vid: t.vid, title: t.title, thumb: t.thumb }));
    localStorage.setItem('yt-playlists', JSON.stringify(saved));
    closeSaveModal();
    renderSaved();
  }

  function renderSaved() {
    const saved = JSON.parse(localStorage.getItem('yt-playlists') || '{}');
    const el = document.getElementById('savedList');
    const keys = Object.keys(saved);
    if (!keys.length) { el.innerHTML = `<div class="no-saved">No saved playlists yet</div>`; return; }
    el.innerHTML = keys.map(k => `
      <div class="saved-item" onclick="loadPlaylist('${k}')">
        <div class="saved-item-name">${k}</div>
        <div class="saved-item-count">${saved[k].length}t</div>
        <button class="saved-del" onclick="event.stopPropagation(); deletePlaylist('${k}')">✕</button>
      </div>
    `).join('');
  }

  function loadPlaylist(name) {
    const saved = JSON.parse(localStorage.getItem('yt-playlists') || '{}');
    if (!saved[name]) return;
    queue = saved[name].map(t => ({ ...t, url: `https://youtube.com/watch?v=${t.vid}` }));
    currentIndex = -1;
    if (playerReady && player) player.stopVideo();
    renderQueue();
    if (queue.length) playIndex(0);
  }

  function deletePlaylist(name) {
    const saved = JSON.parse(localStorage.getItem('yt-playlists') || '{}');
    delete saved[name];
    localStorage.setItem('yt-playlists', JSON.stringify(saved));
    renderSaved();
  }

  // Close modal on overlay click
  document.getElementById('saveModal').addEventListener('click', function(e) {
    if (e.target === this) closeSaveModal();
  });

  // Init
  renderQueue();
  renderSaved();
</script>
</body>
</html>
